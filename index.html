<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Reggae+One&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./login.css">
    <title>CryptoBoard Login</title>
</head>
<body>
    <div class="container">
        <div class="login">
            <h3>Please Fill out form to Register!</h3>
            <div class="form">
                <label for="user-name">Username:</label>
                <input id="user-name" name="user-name" type="text">
                <label for="user-password">Password:</label>
                <input id="user-password" name="user-password" type="password">
                <button>
                    <span class="login-btn">Login</span>
                    /
                    <span class="sign-up">SignUp</span>
                </button>
            </div>
            <div>
                <a href="#"><img src="./img/login-facebook.png" alt=""></a>
                <a href="#"><img src="./img/login-whatsup.png" alt=""></a>
                <a href="#"><img src="./img/login-telegram.png" alt=""></a>
            </div>
        </div>
        <img class="lines" src="./img/login-lines.png" alt="">
        <img class="laptop" src="./img/laptop.png" alt="">
        <div class="purple-box"></div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
